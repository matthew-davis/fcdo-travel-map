name: Daily FCDO Advisory Scrape

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:
    inputs:
      date_override:
        description: "Date label for snapshot (YYYY-MM-DD). Defaults to today."
        required: false
        default: ""
 
permissions:
  contents: write
  pages: write
  id-token: write
 
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
 
      - name: Install dependencies
        run: npm install
 
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils imagemagick
 
      - name: Run scraper
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date_override }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date_override }}"
          fi
          node scripts/scraper.js $DATE_ARG
 
      - name: Process map images for changed countries
        run: node scripts/update_maps.js
 
      - name: Commit and push snapshot
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
 
          git add data/snapshots/ data/snapshot_today.json data/snapshot_index.json data/maps/
 
          if git diff --cached --quiet; then
            echo "No changes to commit — advisory data unchanged since last run."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            TODAY=$(date -u +%Y-%m-%d)
            git commit -m "chore: FCDO snapshot ${TODAY}"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
 
  deploy:
    needs: scrape
    runs-on: ubuntu-latest
 
    if: needs.scrape.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
 
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
 
    permissions:
      pages: write
      id-token: write
 
    steps:
      - name: Checkout repository (with latest committed snapshot)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
 
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
 
      - name: Upload site to Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
 
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
