name: Daily FCDO Advisory Scrape

on:
  schedule:
    # Run at 06:30 UTC every day (FCDO typically updates overnight UK time)
    - cron: "30 6 * * *"
  workflow_dispatch:
    # Allow manual trigger from the Actions tab
    inputs:
      date_override:
        description: "Date label for snapshot (YYYY-MM-DD). Defaults to today."
        required: false
        default: ""

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run scraper
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date_override }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date_override }}"
          fi
          node scraper.js $DATE_ARG

      - name: Commit and push snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/snapshots/ data/snapshot_today.json

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit — advisory data unchanged since last run."
          else
            TODAY=$(date -u +%Y-%m-%d)
            git commit -m "chore: FCDO snapshot ${TODAY}"
            git push
          fi
